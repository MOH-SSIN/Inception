server
{
    listen 443 ssl;
    server_name mez-zahi.42.fr;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    root /var/www/html;

    index wlcm.html;

    location / {
        try_files $uri $uri/ =404;
    }
}