version: '3.8'

services:
  mariadb:
    build: ./requirements/mariadb
    image: mariadb:mez-zahi
    container_name: mariadb
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - inception
    restart: always

  wordpress:
    build: ./requirements/wordpress
    image: wordpress:mez-zahi
    container_name: wordpress
    env_file: .env
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - mariadb

  nginx:
    build: ./requirements/nginx
    image: nginx:mez-zahi
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - inception
    restart: always
    depends_on:
      - wordpress

volumes:
  mariadb_data:
    name : mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mez-zahi/data/mariadb

  wordpress_data:
    name : wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mez-zahi/data/wordpress

networks:
  inception:
    driver: bridge
    name : inception 
